    // ==================== 安定したTextareaコンポーネント ====================
    // 親の再レンダリングに影響されない
    const StableTextarea = React.memo(({ id, initialValue, onChange, onSelect, onMouseUp, placeholder, style }) => {
      const ref = useRef(null);
      
      // 初期値を設定（一度だけ）
      useEffect(() => {
        if (ref.current && ref.current.value === '') {
          ref.current.value = initialValue || '';
        }
      }, []);
      
      // idが変わったら値を更新
      useEffect(() => {
        if (ref.current) {
          ref.current.value = initialValue || '';
        }
      }, [id]);
      
      const handleChange = useCallback((e) => {
        onChange(e.target.value);
      }, [onChange]);
      
      return (
        <textarea
          ref={ref}
          defaultValue={initialValue}
          onChange={handleChange}
          onSelect={onSelect}
          onMouseUp={onMouseUp}
          placeholder={placeholder}
          style={style}
        />
      );
    }, (prev, next) => {
      // idが同じなら再レンダリングしない
      return prev.id === next.id;
    });

    // ==================== 暗号化ユーティリティ ====================
    const CryptoUtils = {
      // Web Crypto APIが使えるかチェック
      isAvailable() {
        if (!window.crypto || !window.crypto.subtle) {
          return { available: false, reason: 'Web Crypto APIがサポートされていません' };
        }
        
        // iOS Safariのプライベートブラウジングチェック
        try {
          // localStorageのテスト
          const test = '__crypto_test__';
          localStorage.setItem(test, test);
          localStorage.removeItem(test);
          return { available: true };
        } catch (e) {
          return { available: false, reason: 'プライベートブラウジングモードでは使用できません。通常モードに切り替えてください。' };
        }
      },
      
      // パスワードから暗号化キーを生成
      async deriveKey(password, salt) {
        const encoder = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
          'raw', encoder.encode(password), 'PBKDF2', false, ['deriveBits', 'deriveKey']
        );
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
          keyMaterial, { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']
        );
      },
      
      // データを暗号化
      async encrypt(data, password) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await this.deriveKey(password, salt);
        const encoder = new TextEncoder();
        
        // 安全にJSON文字列化
        const jsonString = typeof data === 'string' ? data : JSON.stringify(data);
        
        const encrypted = await crypto.subtle.encrypt(
          { name: 'AES-GCM', iv }, key, encoder.encode(jsonString)
        );
        // salt + iv + encrypted data をBase64で返す
        const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        combined.set(salt, 0);
        combined.set(iv, salt.length);
        combined.set(new Uint8Array(encrypted), salt.length + iv.length);
        
        // 大きなデータでもスタックオーバーフローしないようにチャンク処理
        let binary = '';
        const chunkSize = 8192;
        for (let i = 0; i < combined.length; i += chunkSize) {
          const chunk = combined.subarray(i, Math.min(i + chunkSize, combined.length));
          binary += String.fromCharCode.apply(null, chunk);
        }
        return btoa(binary);
      },
      
      // データを復号
      async decrypt(encryptedBase64, password) {
        try {
          // 大きなデータでも安全にデコード
          const binaryStr = atob(encryptedBase64);
          const combined = new Uint8Array(binaryStr.length);
          for (let i = 0; i < binaryStr.length; i++) {
            combined[i] = binaryStr.charCodeAt(i);
          }
          const salt = combined.slice(0, 16);
          const iv = combined.slice(16, 28);
          const encrypted = combined.slice(28);
          const key = await this.deriveKey(password, salt);
          const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, encrypted);
          return JSON.parse(new TextDecoder().decode(decrypted));
        } catch (e) {
          throw new Error('復号に失敗しました。パスワードが間違っています。');
        }
      },
      
      // パスワードのハッシュ（検証用）
      async hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password + 'noteapp-salt-v1');
        const hash = await crypto.subtle.digest('SHA-256', data);
        return btoa(String.fromCharCode(...new Uint8Array(hash)));
      }
    };

    // ==================== GitHub Gist API ====================
    const GistAPI = {
      async saveToGist(token, gistId, encryptedData, passwordHash) {
        const content = JSON.stringify({ encrypted: encryptedData, hash: passwordHash, version: 2 });
        const body = {
          description: 'NoteApp Backup (Encrypted)',
          public: false,
          files: { 'noteapp-backup.json': { content } }
        };
        
        const url = gistId 
          ? `https://api.github.com/gists/${gistId}`
          : 'https://api.github.com/gists';
        
        const response = await fetch(url, {
          method: gistId ? 'PATCH' : 'POST',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body)
        });
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || 'Gistへの保存に失敗しました');
        }
        
        return response.json();
      },
      
      async loadFromGist(token, gistId) {
        const response = await fetch(`https://api.github.com/gists/${gistId}`, {
          headers: { 'Authorization': `token ${token}` }
        });
        
        if (!response.ok) {
          throw new Error('Gistからの読み込みに失敗しました');
        }
        
        const gist = await response.json();
        const file = gist.files['noteapp-backup.json'];
        if (!file) throw new Error('バックアップファイルが見つかりません');
        
        // 大きなファイルはGist APIがcontentを切り捨てるのでraw_urlから取得
        let content = file.content;
        if (file.truncated || !content) {
          console.log('[Gist読み込み] ファイルが大きいためraw_urlから取得します');
          const rawResponse = await fetch(file.raw_url, {
            headers: { 'Authorization': `token ${token}` }
          });
          if (!rawResponse.ok) {
            throw new Error('Gistの生データ取得に失敗しました');
          }
          content = await rawResponse.text();
        }
        
        return JSON.parse(content);
      }

        { id: 'calendar', x: 0, y: 2, w: 6, h: 4 },
        { id: 'weeklyChart', x: 6, y: 2, w: 6, h: 2 },
        { id: 'links', x: 6, y: 4, w: 6, h: 2 },
      ],
      collapsedSections: { completed: true, onHold: true, holdItems: true }, // 折りたたみ状態
    };

    // ==================== タイマー ====================
    const PomodoroTimer = ({ theme, settings }) => {
      const [mode, setMode] = useState('work');
      const [timeLeft, setTimeLeft] = useState(settings.pomodoroWork * 60);
      const [isRunning, setIsRunning] = useState(false);
      const [customWork, setCustomWork] = useState(settings.pomodoroWork);
      const [customBreak, setCustomBreak] = useState(settings.pomodoroBreak);
      const audioContextRef = useRef(null);

      const playSound = useCallback((type) => {
        try {
          if (!audioContextRef.current) {
            audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
          }
          const ctx = audioContextRef.current;
          
          // 終了音：3回鳴らす
          const playBeep = (freq, delay) => {
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            oscillator.frequency.value = freq;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.8, ctx.currentTime + delay);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 0.3);
            oscillator.start(ctx.currentTime + delay);
            oscillator.stop(ctx.currentTime + delay + 0.3);
          };
          
          if (type === 'workEnd') {
            // 作業終了：高い音3回
            playBeep(880, 0);
            playBeep(880, 0.4);
            playBeep(1046.5, 0.8);
          } else if (type === 'breakEnd') {
            // 休憩終了：低めの音3回
            playBeep(523.25, 0);
            playBeep(523.25, 0.4);
            playBeep(659.25, 0.8);
          }
        } catch (e) { console.log('Audio not supported'); }
      }, []);

      useEffect(() => {
        let interval;
        if (isRunning && timeLeft > 0) {
          interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
        } else if (timeLeft === 0 && isRunning) {
          if (mode === 'work') {
            playSound('workEnd');
            setTimeout(() => { setMode('break'); setTimeLeft(customBreak * 60); }, 1500);
          } else {
            playSound('breakEnd');
            setTimeout(() => { setMode('work'); setTimeLeft(customWork * 60); }, 1500);
          }
        }
        return () => clearInterval(interval);
      }, [isRunning, timeLeft, mode, customWork, customBreak, playSound]);

      const toggleTimer = () => {
        setIsRunning(!isRunning);
      };

      const resetTimer = () => { setIsRunning(false); setMode('work'); setTimeLeft(customWork * 60); };
      const formatTime = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
      const progress = mode === 'work' ? (1 - timeLeft / (customWork * 60)) * 100 : (1 - timeLeft / (customBreak * 60)) * 100;

      return (
        <div style={{ padding: '16px', height: '100%', display: 'flex', flexDirection: 'column' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }}>
            <span style={{ fontSize: '12px', color: theme.textSecondary }}>{mode === 'work' ? '🔥 作業中' : '☕ 休憩中'}</span>
            <div style={{ display: 'flex', gap: '4px', alignItems: 'center' }}>
              <input type="number" value={customWork} onChange={(e) => { setCustomWork(Number(e.target.value)); if (!isRunning && mode === 'work') setTimeLeft(Number(e.target.value) * 60); }} style={{ width: '36px', padding: '2px 4px', fontSize: '11px', background: theme.bgTertiary, border: `1px solid ${theme.border}`, borderRadius: '4px', color: theme.text, textAlign: 'center' }} />
              <span style={{ fontSize: '11px', color: theme.textSecondary }}>/</span>
              <input type="number" value={customBreak} onChange={(e) => { setCustomBreak(Number(e.target.value)); if (!isRunning && mode === 'break') setTimeLeft(Number(e.target.value) * 60); }} style={{ width: '36px', padding: '2px 4px', fontSize: '11px', background: theme.bgTertiary, border: `1px solid ${theme.border}`, borderRadius: '4px', color: theme.text, textAlign: 'center' }} />
              <span style={{ fontSize: '11px', color: theme.textSecondary }}>分</span>
            </div>
          </div>
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ fontSize: '36px', fontWeight: '600', fontFamily: 'monospace', color: mode === 'work' ? theme.accent : theme.success }}>{formatTime(timeLeft)}</div>
          </div>
          <div style={{ height: '4px', background: theme.bgTertiary, borderRadius: '2px', marginBottom: '12px', overflow: 'hidden' }}>
            <div style={{ height: '100%', width: `${progress}%`, background: mode === 'work' ? theme.accent : theme.success, transition: 'width 1s linear' }} />
          </div>
          <div style={{ display: 'flex', gap: '8px', justifyContent: 'center' }}>
            <button onClick={toggleTimer} style={{ padding: '8px 20px', background: isRunning ? theme.warning : theme.accent, color: '#fff', border: 'none', borderRadius: '6px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '6px', fontSize: '13px' }}>
              {isRunning ? <Icons.Pause /> : <Icons.Play />}{isRunning ? '一時停止' : 'スタート'}
            </button>
            <button onClick={resetTimer} style={{ padding: '8px 12px', background: theme.bgTertiary, color: theme.text, border: `1px solid ${theme.border}`, borderRadius: '6px', cursor: 'pointer', display: 'flex', alignItems: 'center' }}><Icons.RotateCcw /></button>
          </div>
        </div>
      );
    };

    // ==================== フローティングポモドーロ ====================
    const FloatingPomodoro = ({ theme, onClose }) => {
      // localStorageから初期状態を復元
      const getSavedState = () => {
        try {
          const saved = localStorage.getItem('pomodoroState');
          if (saved) {
            const state = JSON.parse(saved);
            // タイマーが動いていた場合、経過時間を計算
            if (state.isRunning && state.lastUpdateTime) {
              const elapsed = Math.floor((Date.now() - state.lastUpdateTime) / 1000);
              state.timeLeft = Math.max(0, state.timeLeft - elapsed);
            }
            return state;
          }
        } catch (e) {
          console.log('Failed to load pomodoro state');
        }
        return null;
      };

      const savedState = getSavedState();
      const [mode, setMode] = useState(savedState?.mode || 'work');
      const [timeLeft, setTimeLeft] = useState(savedState?.timeLeft || 55 * 60);
      const [isRunning, setIsRunning] = useState(savedState?.isRunning || false);
      const [customWork, setCustomWork] = useState(savedState?.customWork || 55);
      const [customBreak, setCustomBreak] = useState(savedState?.customBreak || 5);
      const [isMinimized, setIsMinimized] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      
      // 音声設定
      const [bgmEnabled, setBgmEnabled] = useState(true);
      const [sfxEnabled, setSfxEnabled] = useState(true);
      const [bgmVolume, setBgmVolume] = useState(0.3);
      const [sfxVolume, setSfxVolume] = useState(0.7);
      const [workBgm, setWorkBgm] = useState('rain'); // 作業用BGM
      const [breakBgm, setBreakBgm] = useState('houkagonoyuzora'); // 休憩用BGM
      const [workBgmCategory, setWorkBgmCategory] = useState('all'); // 作業用カテゴリフィルター
      const [breakBgmCategory, setBreakBgmCategory] = useState('all'); // 休憩用カテゴリフィルター
      
      // Audio refs
      const bgmRef = useRef(null);
      const countdownRef = useRef(null);

        { id: 'fantasy', name: '✨ ファンタジー' },

        { id: 'horror', name: '👻 ホラー' },
        { id: 'comic', name: '🎪 コミカル' },

      // 利用可能なBGM
      const bgmOptions = [
        { id: 'none', name: '🔇 なし', category: 'all' },
        // 環境音
        { id: 'rain', name: '🌧️ 雨音', category: 'env' },
        { id: 'water', name: '💧 水の中', category: 'env' },

        // 切ない

        { id: 'summermemory', name: '🌻 夏の思い出', category: 'sad' },

        // ファンタジー
        { id: 'basharoad', name: '🐴 馬車道', category: 'fantasy' },

        // ダーティ
        { id: 'casino', name: '🎰 カジノ曲', category: 'dirty' },
        { id: 'fishy', name: '🐟 怪しい曲', category: 'dirty' },
        { id: 'jazztown', name: '🎷 ジャジーな町の曲', category: 'dirty' },
        // ホラー
        { id: 'izanauwarabeuta', name: '👧 イザナウワラベ', category: 'horror' },
        { id: 'dethoflondon', name: '🇬🇧 ロンドンの死', category: 'horror' },
        { id: 'coffeemaker', name: '☕ ブリキのコーヒーメーカー', category: 'horror' },
        // コミカル
        { id: 'dacing', name: '🌿 草原ダンスィング', category: 'comic' },
        { id: 'youkinamafia', name: '🕺 陽気なマフィア', category: 'comic' },
        { id: 'raribou', name: '😵 ラリ坊', category: 'comic' },
      ];
      
      // フィルターされたBGMリスト（作業用）
      const filteredWorkBgmOptions = workBgmCategory === 'all' 
        ? bgmOptions 
        : bgmOptions.filter(b => b.category === workBgmCategory || b.id === 'none');
      
      // フィルターされたBGMリスト（休憩用）
      const filteredBreakBgmOptions = breakBgmCategory === 'all' 
        ? bgmOptions 
        : bgmOptions.filter(b => b.category === breakBgmCategory || b.id === 'none');
      
      // フェードアウト処理
      const fadeOut = useCallback((audio, duration = 2000) => {
        return new Promise((resolve) => {
          if (!audio || audio.paused) { resolve(); return; }
          const startVolume = audio.volume;
          const steps = 20;
          const stepTime = duration / steps;
          const volumeStep = startVolume / steps;
          let currentStep = 0;
          
          const fadeInterval = setInterval(() => {
            currentStep++;
            audio.volume = Math.max(0, startVolume - (volumeStep * currentStep));
            if (currentStep >= steps) {
              clearInterval(fadeInterval);
              audio.pause();
              audio.volume = startVolume;
              resolve();
            }
          }, stepTime);
        });
      }, []);
      
      // フェードイン処理
      const fadeIn = useCallback((audio, targetVolume, duration = 2000) => {
        if (!audio) return;
        audio.volume = 0;
        audio.play().catch(() => {});
        const steps = 20;
        const stepTime = duration / steps;
        const volumeStep = targetVolume / steps;
        let currentStep = 0;
        
        const fadeInterval = setInterval(() => {
          currentStep++;
          audio.volume = Math.min(targetVolume, volumeStep * currentStep);
          if (currentStep >= steps) {
            clearInterval(fadeInterval);
          }
        }, stepTime);
      }, []);
      
      // BGM再生
      const playBgm = useCallback((bgmId, fade = true) => {
        if (!bgmEnabled || bgmId === 'none') {
          if (bgmRef.current) bgmRef.current.pause();
          return;
        }
        
        const url = `https://mi0424.github.io/note/sounds/${bgmId}.mp3`;
        if (bgmRef.current) {
          bgmRef.current.pause();
        }
        bgmRef.current = new Audio(url);
        bgmRef.current.loop = true;
        if (fade) {
          fadeIn(bgmRef.current, bgmVolume);
        } else {
          bgmRef.current.volume = bgmVolume;
          bgmRef.current.play().catch(() => {});
        }
      }, [bgmEnabled, bgmVolume, fadeIn]);
      
      // 作業中にBGM変更した場合、即座に切り替え
      const handleWorkBgmChange = (newBgm) => {
        setWorkBgm(newBgm);
        if (isRunning && mode === 'work') {
          playBgm(newBgm, false);
        }
      };
      
      const handleBreakBgmChange = (newBgm) => {
        setBreakBgm(newBgm);
        if (isRunning && mode === 'break') {
          playBgm(newBgm, false);
        }
      };
      
      // カウントダウン効果音再生
      const playCountdown = useCallback(() => {
        if (!sfxEnabled) return;
        try {
          countdownRef.current = new Audio('https://mi0424.github.io/note/sounds/countdown.mp3');
          countdownRef.current.volume = sfxVolume;
          countdownRef.current.play().catch(() => {});
        } catch (e) {
          console.log('Countdown SFX not available');
        }
      }, [sfxEnabled, sfxVolume]);
      
      // 3秒前の処理
      useEffect(() => {
        if (isRunning && timeLeft === 3 && !isFadingRef.current) {
          isFadingRef.current = true;
          // カウントダウン効果音を再生
          playCountdown();
          // BGMをフェードアウト
          if (bgmRef.current) {
            fadeOut(bgmRef.current, 2500);
          }
        }
      }, [timeLeft, isRunning, playCountdown, fadeOut]);
      
      // モード切替時の処理
      useEffect(() => {
        if (isRunning) {
          isFadingRef.current = false;
          const currentBgm = mode === 'work' ? workBgm : breakBgm;
          playBgm(currentBgm);
        }
      }, [mode, isRunning]);
      
      // 開始/停止時の処理
      useEffect(() => {
        if (isRunning && bgmEnabled) {
          const currentBgm = mode === 'work' ? workBgm : breakBgm;
          if (currentBgm !== 'none') {
            playBgm(currentBgm);
          }
        } else {
          if (bgmRef.current) {
            bgmRef.current.pause();
          }
        }
        return () => {
          if (bgmRef.current) bgmRef.current.pause();
        };
      }, [isRunning, bgmEnabled]);
      
      // 音量変更時
      useEffect(() => {
        if (bgmRef.current && !isFadingRef.current) {
          bgmRef.current.volume = bgmVolume;
        }
      }, [bgmVolume]);

      // カウントダウン
      useEffect(() => {
        let interval;
        if (isRunning && timeLeft > 0) {
          interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
        } else if (timeLeft === 0 && isRunning) {
          // モード切替
          setTimeout(() => {
            isFadingRef.current = false;
            if (mode === 'work') {
              setMode('break');
              setTimeLeft(customBreak * 60);
            } else {
              setMode('work');
              setTimeLeft(customWork * 60);
            }
          }, 500);
        }
        return () => clearInterval(interval);
      }, [isRunning, timeLeft, mode, customWork, customBreak]);

      const formatTime = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
      const progress = mode === 'work' ? (1 - timeLeft / (customWork * 60)) * 100 : (1 - timeLeft / (customBreak * 60)) * 100;

      // 状態をlocalStorageに保存
      useEffect(() => {
        try {
          const state = {
            mode,
            timeLeft,
            isRunning,
            customWork,
            customBreak,
            lastUpdateTime: Date.now()
          };
          localStorage.setItem('pomodoroState', JSON.stringify(state));
        } catch (e) {
          console.log('Failed to save pomodoro state');
        }
      }, [mode, timeLeft, isRunning, customWork, customBreak]);

      // リセット処理
      const handleReset = () => {
        setIsRunning(false);
        setMode('work');
        setTimeLeft(customWork * 60);
        isFadingRef.current = false;
        if (bgmRef.current) bgmRef.current.pause();
        if (countdownRef.current) countdownRef.current.pause();
        // localStorageもクリア
        localStorage.removeItem('pomodoroState');
      };

      // 最小化時
      if (isMinimized) {
        return (
          <div 
            onClick={() => setIsMinimized(false)}
            style={{ 
              position: 'fixed', bottom: '80px', right: '20px', zIndex: 1001,
              background: mode === 'work' ? theme.accent : theme.success, 
              color: '#fff', borderRadius: '50%', width: '56px', height: '56px',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              cursor: 'pointer', boxShadow: '0 4px 12px rgba(0,0,0,0.3)',
              flexDirection: 'column', fontSize: '11px', fontWeight: '600'
            }}
          >
            <span style={{ fontSize: '14px' }}>{isRunning ? '🔥' : '⏸️'}</span>
            <span style={{ fontFamily: 'monospace' }}>{formatTime(timeLeft)}</span>
          </div>
        );
      }

      return (
        <div style={{ 
          position: 'fixed', bottom: '80px', right: '20px', zIndex: 1001,
          background: theme.bgSecondary, borderRadius: '16px', padding: '16px',
          boxShadow: '0 4px 20px rgba(0,0,0,0.3)', border: `1px solid ${theme.border}`,
          width: showSettings ? '300px' : '200px', maxHeight: '80vh', overflow: 'auto'
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
            <span style={{ fontSize: '12px', color: theme.textSecondary }}>{mode === 'work' ? '🔥 作業中' : '☕ 休憩'}</span>
            <div style={{ display: 'flex', gap: '4px' }}>
              <button onClick={() => setShowSettings(!showSettings)} style={{ background: showSettings ? theme.accent : 'none', border: 'none', color: showSettings ? '#fff' : theme.textSecondary, cursor: 'pointer', padding: '4px', borderRadius: '4px' }} title="音声設定">
                🔊
              </button>
              <button onClick={() => setIsMinimized(true)} style={{ background: 'none', border: 'none', color: theme.textSecondary, cursor: 'pointer', padding: '2px' }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <button onClick={onClose} style={{ background: 'none', border: 'none', color: theme.textSecondary, cursor: 'pointer', padding: '2px' }}><Icons.X /></button>
            </div>
          </div>
          
          {showSettings ? (
            <div style={{ marginBottom: '12px', padding: '12px', background: theme.bgTertiary, borderRadius: '8px' }}>
              {/* BGM ON/OFF */}
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }}>
                <span style={{ fontSize: '11px', color: theme.textSecondary }}>🎵 BGM</span>
                <button onClick={() => setBgmEnabled(!bgmEnabled)} style={{ padding: '2px 8px', fontSize: '10px', background: bgmEnabled ? theme.accent : theme.bgSecondary, color: bgmEnabled ? '#fff' : theme.textSecondary, border: `1px solid ${theme.border}`, borderRadius: '4px', cursor: 'pointer' }}>
                  {bgmEnabled ? 'ON' : 'OFF'}
                </button>
              </div>
              
              {/* 作業用BGM */}
              <div style={{ marginBottom: '14px', padding: '10px', background: theme.bg, borderRadius: '6px', border: `1px solid ${theme.accent}40` }}>
                <span style={{ fontSize: '10px', color: theme.accent, fontWeight: '600', display: 'block', marginBottom: '6px' }}>🔥 作業用BGM {isRunning && mode === 'work' && '(再生中)'}</span>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '3px', marginBottom: '6px' }}>
                  {bgmCategories.filter(c => c.id !== 'other').map(cat => (
                    <button

                      onClick={() => setWorkBgmCategory(cat.id)}
                      style={{ 
                        padding: '2px 6px',

                        background: workBgmCategory === cat.id ? theme.accent : 'transparent', 
                        color: workBgmCategory === cat.id ? '#fff' : theme.textSecondary, 
                        border: `1px solid ${workBgmCategory === cat.id ? theme.accent : theme.border}`, 
                        borderRadius: '3px', 
                        cursor: 'pointer'

                    >
                      {cat.name}

                  ))}
                </div>
                <select 
                  value={workBgm} 
                  onChange={(e) => handleWorkBgmChange(e.target.value)} 
                  disabled={!bgmEnabled} 
                  style={{ width: '100%', padding: '6px', fontSize: '11px', background: theme.bgSecondary, border: `1px solid ${theme.border}`, borderRadius: '4px', color: theme.text }}

                  {filteredWorkBgmOptions.map(opt => <option key={opt.id} value={opt.id}>{opt.name}</option>)}

              </div>
              
              {/* 休憩用BGM */}

                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '3px', marginBottom: '6px' }}>
                  {bgmCategories.filter(c => c.id !== 'other').map(cat => (

    const WeeklyChartWidget = ({ progress, progressAdjustments = {}, theme }) => {
      const [period, setPeriod] = useState(7); // 7, 14, 30, 90日
      const [offset, setOffset] = useState(0); // 過去にスクロールするオフセット
      
      const days = [];
      const startOffset = offset * period;
      for (let i = period - 1 + startOffset; i >= startOffset; i--) {
        const date = new Date(); date.setDate(date.getDate() - i);
        const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        const rawValue = progress[key] || 0;
        const adjustment = progressAdjustments[key] || 0;
        const dayOfWeek = ['日','月','火','水','木','金','土'][date.getDay()];
        const label = period <= 14 ? dayOfWeek : `${date.getMonth()+1}/${date.getDate()}`;
        days.push({ label, value: Math.max(0, rawValue + adjustment), isToday: i === 0, date: key });
      }
      const maxValue = Math.max(...days.map(d => d.value), 1000);
      const maxBarHeight = 80;
      const totalChars = days.reduce((sum, d) => sum + d.value, 0);
      
      // 期間のラベル
      const getPeriodLabel = () => {
        if (offset === 0) return '現在';
        const endDate = new Date(); endDate.setDate(endDate.getDate() - offset * period);
        const startDate = new Date(); startDate.setDate(startDate.getDate() - (offset + 1) * period + 1);
        return `${startDate.getMonth()+1}/${startDate.getDate()}〜${endDate.getMonth()+1}/${endDate.getDate()}`;
      };
      
      return (
        <div style={{ padding: '12px', height: '100%', display: 'flex', flexDirection: 'column' }}>
          {/* ヘッダー */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px', flexWrap: 'wrap', gap: '4px' }}>
            <div style={{ display: 'flex', gap: '4px' }}>
              {[7, 14, 30, 90].map(p => (
                <button key={p} onClick={() => { setPeriod(p); setOffset(0); }} style={{ padding: '2px 6px', fontSize: '9px', background: period === p ? theme.accent : theme.bgTertiary, color: period === p ? '#fff' : theme.textSecondary, border: 'none', borderRadius: '4px', cursor: 'pointer' }}>
                  {p === 7 ? '1週' : p === 14 ? '2週' : p === 30 ? '1ヶ月' : '3ヶ月'}
                </button>
              ))}
            </div>
            <span style={{ fontSize: '10px', color: theme.accent, fontWeight: '600' }}>計 {totalChars.toLocaleString()}字</span>
          </div>
          {/* ナビゲーション */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' }}>
            <button onClick={() => setOffset(o => o + 1)} style={{ padding: '2px 8px', fontSize: '10px', background: theme.bgTertiary, border: 'none', borderRadius: '4px', cursor: 'pointer', color: theme.textSecondary }}>◀ 前</button>
            <span style={{ fontSize: '10px', color: theme.textSecondary }}>{getPeriodLabel()}</span>
            <button onClick={() => setOffset(o => Math.max(0, o - 1))} disabled={offset === 0} style={{ padding: '2px 8px', fontSize: '10px', background: offset === 0 ? theme.bgTertiary : theme.bgTertiary, border: 'none', borderRadius: '4px', cursor: offset === 0 ? 'not-allowed' : 'pointer', color: theme.textSecondary, opacity: offset === 0 ? 0.5 : 1 }}>次 ▶</button>
          </div>
          {/* グラフ */}
          <div style={{ flex: 1, display: 'flex', alignItems: 'flex-end', gap: period <= 14 ? '4px' : '2px', overflow: 'hidden' }}>
            {days.map((d, i) => {
              const barHeight = Math.max((d.value / maxValue) * maxBarHeight, d.value > 0 ? 4 : 2);
              return (
                <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2px', minWidth: 0 }}>
                  <span style={{ fontSize: '8px', color: d.isToday ? theme.accent : theme.textSecondary, fontWeight: d.value > 0 ? '500' : '400', minHeight: '12px', overflow: 'hidden' }}>
                    {d.value > 0 ? (d.value >= 1000 ? `${(d.value/1000).toFixed(1)}k` : d.value) : ''}

                  <div style={{ width: '100%', height: `${barHeight}px`, background: d.isToday ? theme.accent : d.value > 0 ? theme.accentLight : theme.bgTertiary, borderRadius: '2px 2px 0 0' }} title={`${d.date}: ${d.value.toLocaleString()}字`} />
                  <span style={{ fontSize: period <= 14 ? '9px' : '7px', color: d.isToday ? theme.accent : theme.textSecondary, fontWeight: d.isToday ? '600' : '400', overflow: 'hidden', textOverflow: 'ellipsis' }}>{d.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // ==================== アウトラインエディタ ====================
    const OutlineEditor = ({ content, onChange, theme, editorId }) => {
      const modeKey = editorId ? `outline-mode-${editorId}` : null;
      const collapsedKey = editorId ? `outline-collapsed-v2-${editorId}` : null;
      const [mode, setMode] = useState(() => {
        if (modeKey) { try { return localStorage.getItem(modeKey) || 'text'; } catch(e) {} }
        return 'text';
      });
      const [collapsed, setCollapsed] = useState(() => {
        if (collapsedKey) { try { return JSON.parse(localStorage.getItem(collapsedKey)) || {}; } catch(e) {} }
        return {};
      });
      const [draggedId, setDraggedId] = useState(null);
      const [dragOverId, setDragOverId] = useState(null);
      const dragAllowedRef = useRef(false);
      const scrollContainerRef = useRef(null);
      const scrollPositionRef = useRef(0);

      useEffect(() => {
        if (modeKey) localStorage.setItem(modeKey, mode);
      }, [mode, modeKey]);
      useEffect(() => {
        if (collapsedKey) localStorage.setItem(collapsedKey, JSON.stringify(collapsed));
      }, [collapsed, collapsedKey]);

      const saveScrollPosition = () => {
        if (scrollContainerRef.current) scrollPositionRef.current = scrollContainerRef.current.scrollTop;
      };
      useEffect(() => {
        if (scrollContainerRef.current && scrollPositionRef.current > 0) {
          scrollContainerRef.current.scrollTop = scrollPositionRef.current;
        }
      });

      // --- パース ---
      const parseOutline = (text) => {
        if (!text) return [];
        const lines = text.split('\n');
        const sections = [];
        let current = null;
        let buffer = [];
        const save = () => { if (current) { current.content = buffer.join('\n'); sections.push(current); } };
        lines.forEach((line) => {
          const h1 = line.match(/^# (.*)$/);
          const h2 = line.match(/^## (.*)$/);
          const h3 = line.match(/^### (.*)$/);
          if (h1 || h2 || h3) {
            save();
            current = { id: `section-${sections.length}`, level: h1 ? 1 : h2 ? 2 : 3, title: h1?.[1] || h2?.[1] || h3?.[1] || '', content: '' };
            buffer = [];
          } else {
            buffer.push(line);
          }
        });
        save();
        if (sections.length === 0 && text.trim()) {
          sections.push({ id: 'section-0', level: 0, title: '', content: text });
        }
        return sections;
      };

      const sections = parseOutline(content);

      const rebuildContent = (sectionList) => {
        const newContent = sectionList.map(s => {
          if (s.level === 0) return s.content;
          const prefix = '#'.repeat(s.level) + ' ' + s.title;
          return s.content ? prefix + '\n' + s.content : prefix;
        }).join('\n');
        onChange(newContent);
      };

      const updateSection = (sectionId, field, value) => {
        saveScrollPosition();
        rebuildContent(sections.map(s => s.id === sectionId ? { ...s, [field]: value } : s));
      };

      const addSection = (level) => {
        rebuildContent([...sections, { id: `section-new-${Date.now()}`, level, title: '新しいセクション', content: '' }]);
      };

      const addSectionAfter = (afterId, level) => {
        const idx = sections.findIndex(s => s.id === afterId);
        const ns = [...sections];
        ns.splice(idx + 1, 0, { id: `section-new-${Date.now()}`, level, title: '新しいセクション', content: '' });
        rebuildContent(ns);
      };

      const addChildSection = (parentId) => {
        const idx = sections.findIndex(s => s.id === parentId);
        const pl = sections[idx].level;
        if (pl >= 3) return;
        const ns = [...sections];
        ns.splice(idx + 1, 0, { id: `section-new-${Date.now()}`, level: pl + 1, title: '新しいセクション', content: '' });
        rebuildContent(ns);
      };

      const deleteSection = (sectionId) => {
        if (confirm('このセクションを削除しますか？')) {
          rebuildContent(sections.filter(s => s.id !== sectionId));
        }
      };

      // --- ドラッグ ---
      const handleDragStart = (e, id) => {
        if (!dragAllowedRef.current) { e.preventDefault(); return; }
        setDraggedId(id);
        e.dataTransfer.effectAllowed = 'move';
        saveScrollPosition();
      };
      const handleDragOver = (e, id) => {
        e.preventDefault(); e.stopPropagation();
        if (id !== draggedId) setDragOverId(id);
        if (scrollContainerRef.current && scrollPositionRef.current !== null) {
          scrollContainerRef.current.scrollTop = scrollPositionRef.current;
        }
      };
      const handleDragLeave = () => setDragOverId(null);
      const handleDrop = (e, targetId) => {
        e.preventDefault();
        if (draggedId && targetId && draggedId !== targetId) {
          const di = sections.findIndex(s => s.id === draggedId);
          const ti = sections.findIndex(s => s.id === targetId);
          if (di !== -1 && ti !== -1) {
            const ns = [...sections];
            const [dragged] = ns.splice(di, 1);
            ns.splice(ti, 0, dragged);
            rebuildContent(ns);
          }
        }
        setDraggedId(null); setDragOverId(null);
      };
      const handleDragEnd = () => { setDraggedId(null); setDragOverId(null); dragAllowedRef.current = false; scrollPositionRef.current = 0; };

      // --- 折りたたみ ---
      const toggleCollapse = (id) => setCollapsed(prev => ({ ...prev, [id]: !prev[id] }));
      const isHidden = (idx) => {
        const s = sections[idx];
        for (let i = idx - 1; i >= 0; i--) {
          const prev = sections[i];
          if (prev.level > 0 && prev.level < s.level && collapsed[prev.id]) return true;
          if (prev.level > 0 && prev.level < s.level) break;
        }
        return false;
      };

      // --- コピー ---
      const copyAll = () => {
        const plainText = sections.map(s => {
          if (s.level === 0) return s.content;
          const prefix = s.level === 1 ? '■ ' : s.level === 2 ? '　● ' : '　　・ ';
          return prefix + s.title + (s.content.trim() ? '\n' + s.content : '');
        }).join('\n\n');
        navigator.clipboard.writeText(plainText);
        alert('プロット全体をコピーしました！');
      };

      const toggleAllCollapse = () => {
        const allIds = sections.filter(s => s.level > 0).map(s => s.id);
        const allCollapsed = allIds.every(id => collapsed[id]);
        const nc = {};
        allIds.forEach(id => { nc[id] = !allCollapsed; });
        setCollapsed(nc);
      };

      const autoResize = (textarea) => {
        if (textarea) { textarea.style.height = 'auto'; textarea.style.height = Math.max(40, textarea.scrollHeight) + 'px'; }
      };

      const hasSections = sections.length > 0 && !(sections.length === 1 && sections[0].level === 0);

      // --- ツールバー ---
      const Toolbar = () => (
        <div style={{ padding: '6px 16px', borderBottom: `1px solid ${theme.border}`, display: 'flex', gap: '6px', alignItems: 'center', background: theme.bgSecondary, flexShrink: 0, flexWrap: 'wrap' }}>
          {/* モード切替 */}
          <div style={{ display: 'flex', background: theme.bgTertiary, borderRadius: '6px', padding: '2px', gap: '2px' }}>
            <button onClick={() => setMode('text')} style={{ padding: '4px 10px', fontSize: '11px', background: mode === 'text' ? theme.accent : 'transparent', color: mode === 'text' ? '#fff' : theme.textSecondary, border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: mode === 'text' ? '600' : '400' }}>📝 テキスト</button>
            <button onClick={() => setMode('outline')} style={{ padding: '4px 10px', fontSize: '11px', background: mode === 'outline' ? theme.accent : 'transparent', color: mode === 'outline' ? '#fff' : theme.textSecondary, border: 'none', borderRadius: '4px', cursor: 'pointer', fontWeight: mode === 'outline' ? '600' : '400' }}>📑 折りたたみ</button>
          </div>
          <div style={{ width: '1px', height: '20px', background: theme.border }} />
          {mode === 'outline' && hasSections && (
            <>
              <button onClick={() => addSection(1)} style={{ padding: '4px 10px', fontSize: '11px', background: theme.accent, color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer' }}>+ 大項目</button>
              <button onClick={() => addSection(2)} style={{ padding: '4px 10px', fontSize: '11px', background: theme.bgTertiary, color: theme.text, border: `1px solid ${theme.border}`, borderRadius: '4px', cursor: 'pointer' }}>+ 中項目</button>
              <button onClick={() => addSection(3)} style={{ padding: '4px 10px', fontSize: '11px', background: theme.bgTertiary, color: theme.text, border: `1px solid ${theme.border}`, borderRadius: '4px', cursor: 'pointer' }}>+ 小項目</button>
              <div style={{ width: '1px', height: '20px', background: theme.border }} />
            </>
          )}
          <div style={{ flex: 1 }} />
          {hasSections && (
            <button onClick={copyAll} style={{ padding: '4px 10px', fontSize: '11px', background: theme.success, color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer' }}>📋 全体コピー</button>
          )}
          {mode === 'outline' && hasSections && (
            <>
              <button onClick={toggleAllCollapse} style={{ padding: '4px 10px', fontSize: '11px', background: theme.bgTertiary, color: theme.textSecondary, border: `1px solid ${theme.border}`, borderRadius: '4px', cursor: 'pointer' }}>
                {Object.values(collapsed).filter(Boolean).length > 0 ? '📂 全開く' : '📁 全閉じる'}
              </button>
            </>
          )}
          <span style={{ fontSize: '10px', color: theme.textSecondary }}>
            {mode === 'text' ? '💡 # ## ### で見出し' : '⬍ ドラッグで並び替え'}
          </span>
        </div>
      );

      // ==================== テキストモード ====================
      if (mode === 'text') {
        return (
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
            <Toolbar />
            <div style={{ flex: 1, overflow: 'auto', display: 'flex', justifyContent: 'center', background: theme.bg }}>
              <textarea
                value={content || ''}
                onChange={(e) => onChange(e.target.value)}
                placeholder={'ここにプロットを書く...\n\n# 第1話\n## シーン1\nここに内容\n\n### 詳細\n細かいメモなど'}
                style={{ width: '100%', maxWidth: '900px', height: '100%', padding: '20px 24px', background: 'transparent', border: 'none', outline: 'none', resize: 'none', fontSize: '15px', lineHeight: '2', color: theme.text, fontFamily: '"Noto Serif JP", serif' }}
              />
            </div>
          </div>
        );
      }

      // ==================== 折りたたみモード ====================
      // 見出しがない場合はテキストモードと同じ
      if (!hasSections) {
        return (
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
            <Toolbar />
            <div style={{ flex: 1, overflow: 'auto', display: 'flex', justifyContent: 'center', background: theme.bg }}>
              <textarea
                value={content || ''}
                onChange={(e) => onChange(e.target.value)}
                placeholder={'# 大項目 / ## 中項目 / ### 小項目 で見出しを作ってね'}
                style={{ width: '100%', maxWidth: '900px', height: '100%', padding: '20px 24px', background: 'transparent', border: 'none', outline: 'none', resize: 'none', fontSize: '15px', lineHeight: '2', color: theme.text, fontFamily: '"Noto Serif JP", serif' }}
              />
            </div>
          </div>
        );
      }

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
          <Toolbar />
          <div ref={scrollContainerRef} style={{ flex: 1, overflow: 'auto', background: theme.bg }}>
            <div style={{ maxWidth: '900px', margin: '0 auto', padding: '8px 16px' }}>
              {sections.map((s, idx) => {
                if (isHidden(idx)) return null;
                const indent = s.level > 0 ? (s.level - 1) * 20 : 0;
                const isCollapsedItem = collapsed[s.id];
                const isDragging = draggedId === s.id;
                const isDragOver = dragOverId === s.id;
                const levelColors = { 1: theme.accent, 2: theme.accentLight || theme.accent, 3: theme.textSecondary };

                if (s.level === 0) {
                  return (
                    <div key={s.id} style={{ marginBottom: '4px' }}>
                      <textarea value={s.content} onChange={(e) => { updateSection(s.id, 'content', e.target.value); autoResize(e.target); }} ref={(el) => el && autoResize(el)} style={{ width: '100%', minHeight: '40px', padding: '8px 12px', background: 'transparent', border: 'none', outline: 'none', color: theme.text, fontSize: '14px', lineHeight: '1.8', resize: 'none', overflow: 'hidden', fontFamily: '"Noto Serif JP", serif' }} />
                    </div>
                  );
                }

                return (
                  <div key={s.id}
                    draggable
                    onDragStart={(e) => handleDragStart(e, s.id)}
                    onDragOver={(e) => handleDragOver(e, s.id)}
                    onDragLeave={handleDragLeave}
                    onDrop={(e) => handleDrop(e, s.id)}
                    onDragEnd={handleDragEnd}
                    style={{ marginLeft: indent, opacity: isDragging ? 0.4 : 1, transition: 'opacity 0.15s' }}
                  >
                    {isDragOver && <div style={{ height: '2px', background: theme.accent, borderRadius: '1px', margin: '2px 0' }} />}
                    {/* 見出し行 */}
                    <div style={{
                      display: 'flex', alignItems: 'center', gap: '4px', padding: '6px 4px',
                      borderBottom: `1px solid ${isCollapsedItem ? 'transparent' : theme.border}`,
                      cursor: 'pointer', userSelect: 'none',
                    }}>
                      <span
                        data-drag-handle="true"
                        onMouseDown={() => { dragAllowedRef.current = true; }}
                        onMouseUp={() => { dragAllowedRef.current = false; }}
                        style={{ cursor: 'grab', color: theme.textSecondary, display: 'flex', padding: '2px', opacity: 0.4, flexShrink: 0 }}
                        title="ドラッグで移動"
                      ><Icons.GripVertical /></span>
                      <span
                        onClick={() => toggleCollapse(s.id)}
                        style={{ color: levelColors[s.level] || theme.textSecondary, display: 'flex', transform: isCollapsedItem ? 'rotate(0deg)' : 'rotate(90deg)', transition: 'transform 0.2s', padding: '2px', flexShrink: 0 }}
                      ><Icons.ChevronRight /></span>
                      <span
                        onClick={() => toggleCollapse(s.id)}
                        style={{
                          flex: 1,
                          fontSize: s.level === 1 ? '15px' : s.level === 2 ? '14px' : '13px',
                          fontWeight: s.level === 1 ? '600' : '500',
                          color: s.level === 1 ? theme.accent : theme.text,
                          padding: '2px 0',
                        }}
                      >{s.title || '(無題)'}</span>
                      {isCollapsedItem && s.content.trim() && (
                        <span style={{ fontSize: '11px', color: theme.textSecondary, maxWidth: '200px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flexShrink: 0 }}>
                          {s.content.trim().substring(0, 30)}...
                        </span>
                      )}
                      <div style={{ display: 'flex', gap: '2px', flexShrink: 0, opacity: 0.6 }} onClick={(e) => e.stopPropagation()}>
                        <button onClick={() => addSectionAfter(s.id, s.level)} style={{ padding: '2px 5px', fontSize: '10px', background: 'transparent', color: theme.textSecondary, border: 'none', borderRadius: '3px', cursor: 'pointer' }} title="下に同レベルを追加">+</button>
                        {s.level < 3 && (
                          <button onClick={() => addChildSection(s.id)} style={{ padding: '2px 5px', fontSize: '10px', background: 'transparent', color: theme.textSecondary, border: 'none', borderRadius: '3px', cursor: 'pointer' }} title="子階層を追加">↳</button>
                        )}
                        <button onClick={() => deleteSection(s.id)} style={{ padding: '2px 5px', fontSize: '10px', background: 'transparent', color: theme.textSecondary, border: 'none', borderRadius: '3px', cursor: 'pointer' }} title="削除"><Icons.Trash /></button>
                      </div>
                    </div>
                    {/* 内容（折りたたみ時は非表示） */}
                    {!isCollapsedItem && (
                      <div style={{ paddingLeft: '28px' }}>
                        <textarea
                          value={s.content}
                          onChange={(e) => { updateSection(s.id, 'content', e.target.value); autoResize(e.target); }}
                          ref={(el) => el && autoResize(el)}
                          placeholder="内容を入力..."
                          style={{ width: '100%', minHeight: '32px', padding: '4px 0 8px 0', background: 'transparent', border: 'none', outline: 'none', color: theme.text, fontSize: '14px', lineHeight: '1.8', resize: 'none', overflow: 'hidden', fontFamily: '"Noto Serif JP", serif' }}
                        />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    // ==================== 日常メモセクション ====================
    const DailySection = ({ data, setData, theme }) => {
      const [selectedMemo, setSelectedMemo] = useState(null);
      const [editingId, setEditingId] = useState(null);
      const [tagFilter, setTagFilter] = useState('all');

      const addMemo = () => {
        const newMemo = { id: `daily-${Date.now()}`, title: '新しいメモ', content: '', tags: [], createdAt: new Date().toISOString() };
        setData({ ...data, daily: [newMemo, ...data.daily] });
        setSelectedMemo(newMemo);
      };

      const updateMemo = (id, field, value) => {
        setData({ ...data, daily: data.daily.map(m => m.id === id ? { ...m, [field]: value } : m) });
        if (selectedMemo?.id === id) setSelectedMemo({ ...selectedMemo, [field]: value });
      };

      const deleteMemo = (id) => {
        if (confirm('削除しますか？')) {
          setData({ ...data, daily: data.daily.filter(m => m.id !== id) });
          if (selectedMemo?.id === id) setSelectedMemo(null);
        }
      };

      const addTagToMemo = (memoId, tag) => {
        const memo = data.daily.find(m => m.id === memoId);
        if (memo && !memo.tags.includes(tag)) {
          updateMemo(memoId, 'tags', [...memo.tags, tag]);
        }
      };

      const removeTagFromMemo = (memoId, tag) => {
        const memo = data.daily.find(m => m.id === memoId);
        if (memo) {
          updateMemo(memoId, 'tags', memo.tags.filter(t => t !== tag));
        }
      };

      // タグフィルター適用
      const filteredMemos = tagFilter === 'all' 
        ? data.daily 
        : data.daily.filter(m => m.tags.includes(tagFilter));

      // 使用中のタグを収集
      const usedTags = [...new Set(data.daily.flatMap(m => m.tags))];

      const isMobileView = window.innerWidth <= 768;

      return (
        <div style={{ display: 'flex', height: '100%', flexDirection: isMobileView ? 'column' : 'row' }}>
          {/* リスト（モバイルで選択済みの場合は非表示） */}
          {(!isMobileView || !selectedMemo) && (
            <div style={{ width: isMobileView ? '100%' : '300px', borderRight: isMobileView ? 'none' : `1px solid ${theme.border}`, display: 'flex', flexDirection: 'column', background: theme.bgSecondary, flex: isMobileView ? 1 : 'none' }}>
              <div style={{ padding: '16px', borderBottom: `1px solid ${theme.border}` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                  <span style={{ fontWeight: '600' }}>🗒️ 日常メモ</span>
                  <button onClick={addMemo} style={{ padding: '6px 12px', background: theme.accent, color: '#fff', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', display: 'flex', alignItems: 'center', gap: '4px' }}><Icons.Plus /> 追加</button>
                </div>
                {/* タグフィルター */}
                <div style={{ display: 'flex', gap: '4px', flexWrap: 'wrap' }}>
                  <button onClick={() => setTagFilter('all')} style={{ padding: '4px 8px', fontSize: '10px', background: tagFilter === 'all' ? theme.accent : theme.bgTertiary, color: tagFilter === 'all' ? '#fff' : theme.textSecondary, border: 'none', borderRadius: '4px', cursor: 'pointer' }}>All</button>
                  {usedTags.map(tag => (
                    <button key={tag} onClick={() => setTagFilter(tag)} style={{ padding: '4px 8px', fontSize: '10px', background: tagFilter === tag ? theme.accent : theme.bgTertiary, color: tagFilter === tag ? '#fff' : theme.textSecondary, border: 'none', borderRadius: '4px', cursor: 'pointer' }}>{tag}</button>
                  ))}
                </div>
              </div>
              <div style={{ flex: 1, overflow: 'auto', padding: '8px' }}>
                {filteredMemos.map(memo => (
                  <div key={memo.id} onClick={() => setSelectedMemo(memo)} style={{ padding: '12px', marginBottom: '4px', borderRadius: '8px', cursor: 'pointer', background: selectedMemo?.id === memo.id ? theme.highlight : 'transparent', border: `1px solid ${selectedMemo?.id === memo.id ? theme.accent : 'transparent'}` }}>
                    {editingId === memo.id ? (
                      <input type="text" value={memo.title} onChange={(e) => updateMemo(memo.id, 'title', e.target.value)} onBlur={() => setEditingId(null)} onKeyDown={(e) => e.key === 'Enter' && setEditingId(null)} autoFocus style={{ width: '100%', background: theme.bg, border: `1px solid ${theme.accent}`, borderRadius: '4px', padding: '4px 8px', color: theme.text, fontSize: '13px', outline: 'none', boxSizing: 'border-box' }} />
                    ) : (
                      <div onDoubleClick={() => setEditingId(memo.id)} style={{ fontWeight: '500', fontSize: '13px', marginBottom: '4px' }}>{memo.title}</div>
                    )}
                    <div style={{ display: 'flex', gap: '4px', flexWrap: 'wrap' }}>
                      {memo.tags.map(tag => (
                        <span key={tag} style={{ fontSize: '10px', padding: '2px 6px', background: theme.bgTertiary, borderRadius: '4px', color: theme.textSecondary }}>{tag}</span>
                      ))}
                    </div>
                  </div>
                ))}
                {filteredMemos.length === 0 && <div style={{ textAlign: 'center', color: theme.textSecondary, padding: '40px 20px', fontSize: '13px' }}>{tagFilter === 'all' ? 'メモがありません' : `「${tagFilter}」タグのメモがありません`}<br/>「+ 追加」で作成してね</div>}
              </div>
            </div>
          )}

          {/* エディタ（モバイルで未選択の場合は非表示） */}
          {(!isMobileView || selectedMemo) && (
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: theme.bg }}>
              {selectedMemo ? (
                <>
                  <div style={{ padding: '12px 16px', borderBottom: `1px solid ${theme.border}`, display: 'flex', alignItems: 'center', gap: '12px', background: theme.bgSecondary, flexWrap: 'wrap' }}>
                    {isMobileView && (
                      <button onClick={() => setSelectedMemo(null)} style={{ padding: '6px 10px', background: theme.bgTertiary, color: theme.text, border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '12px' }}>← 戻る</button>
                    )}
                    {editingId === `title-${selectedMemo.id}` ? (
                      <input type="text" value={selectedMemo.title} onChange={(e) => updateMemo(selectedMemo.id, 'title', e.target.value)} onBlur={() => setEditingId(null)} onKeyDown={(e) => e.key === 'Enter' && setEditingId(null)} autoFocus style={{ flex: 1, fontWeight: '500', fontSize: '15px', background: theme.bg, border: `1px solid ${theme.accent}`, borderRadius: '4px', padding: '4px 8px', color: theme.text, outline: 'none', minWidth: '100px', boxSizing: 'border-box' }} />
                    ) : (
                      <span onDoubleClick={() => setEditingId(`title-${selectedMemo.id}`)} style={{ fontWeight: '500', fontSize: '15px', cursor: 'text', flex: 1 }}>{selectedMemo.title}</span>
                    )}
                    <button onClick={() => deleteMemo(selectedMemo.id)} style={{ padding: '6px 12px', background: theme.error, color: '#fff', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '12px' }}>削除</button>
                  </div>
                  {/* タグ */}
                  <div style={{ padding: '12px 16px', borderBottom: `1px solid ${theme.border}`, display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap', background: theme.bgSecondary }}>
                    <Icons.Tag />
                    {selectedMemo.tags.map(tag => (
                      <span key={tag} style={{ fontSize: '11px', padding: '4px 8px', background: theme.accent, color: '#fff', borderRadius: '4px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                        {tag}
                        <button onClick={() => removeTagFromMemo(selectedMemo.id, tag)} style={{ background: 'none', border: 'none', color: '#fff', cursor: 'pointer', padding: 0, display: 'flex' }}><Icons.X /></button>
                      </span>
                    ))}
                    <select value="" onChange={(e) => { if (e.target.value) addTagToMemo(selectedMemo.id, e.target.value); }} style={{ padding: '4px 8px', fontSize: '11px', background: theme.bgTertiary, border: `1px solid ${theme.border}`, borderRadius: '4px', color: theme.text, cursor: 'pointer' }}>
                      <option value="">+ タグ追加</option>
                      {(data.dailyTags || ['仕事', '買い物', 'アイデア', '日記']).filter(t => !selectedMemo.tags.includes(t)).map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                  <div style={{ flex: 1, overflow: 'auto', display: 'flex', justifyContent: 'center' }}>
                    <textarea value={selectedMemo.content} onChange={(e) => updateMemo(selectedMemo.id, 'content', e.target.value)} placeholder="メモを入力..." style={{ width: '800px', padding: '20px 24px', background: 'transparent', border: 'none', outline: 'none', resize: 'none', fontSize: '14px', lineHeight: '1.8', color: theme.text, fontFamily: '"Noto Serif JP", serif' }} />
                  </div>
                </>
              ) : (
                <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: theme.textSecondary }}>メモを選択してね</div>
              )}
            </div>
          )}
        </div>
      );
    };

    // ==================== Inputセクション（タグベース & 自動完了） ====================
    const InputSection = ({ data, setData, theme }) => {
      const [selectedInput, setSelectedInput] = useState(null);
      const [editingId, setEditingId] = useState(null);
      const [filter, setFilter] = useState('all'); // all, reading, finished
      const [tagFilter, setTagFilter] = useState('all');
      const [showTagSelector, setShowTagSelector] = useState(false);

      const addInput = () => {
        const newInput = {
          id: `input-${Date.now()}`,
          title: '新しい作品',
          tags: [],
          startDate: '',
          finishDate: '',
          content: '',
          status: 'reading', // reading | finished
          createdAt: new Date().toISOString()
        };
        setData({ ...data, input: [newInput, ...data.input] });
        setSelectedInput(newInput);
      };

      const updateInput = (id, field, value) => {
        let updates = { [field]: value };
        
        // Finish日付が入力されたら自動的に完了に
        if (field === 'finishDate' && value) {
          updates.status = 'finished';
        }

      const addTagToInput = (inputId, tag) => {

    // ==================== 創作セクション（タグフィルター & ネタ帳統合） ====================
    const CreativeSection = ({ data, setData, selectedItem, setSelectedItem, openInNewPane, theme, sidebarWidth, activeTab, setActiveTab }) => {

      // チェックボックス一括削除用
      const [checkboxMode, setCheckboxMode] = useState(false);
      const [selectedStickies, setSelectedStickies] = useState([]);
      const [selectedIdeas, setSelectedIdeas] = useState([]);
      const [selectedItems, setSelectedItems] = useState({}); // 作品別: { projectId: [itemIds] }

      const ideas = creative.ideas || [];
      const stickies = creative.stickies || [];
      
      // textareaの高さ自動調整
      const autoResize = (textarea) => {
        if (textarea) {
          textarea.style.height = 'auto';
          textarea.style.height = Math.max(60, textarea.scrollHeight) + 'px';
        }
      };
      
      // 原稿進捗ステータス（シーン連動）
      const progressLabels = { none: '', draft_done: 'ドラフト完', completed: '原稿完了' };
      const progressColors = { none: '#9e9e9e', draft_done: '#2196f3', completed: '#4caf50' };
      const progressIcons = { none: '○', draft_done: '◐', completed: '●' };

      const countChars = (project) => project.items.filter(i => i.type === 'chapter').reduce((sum, i) => sum + (i.content || '').replace(/[\s\n]/g, '').length, 0);
      const totalChars = () => [...creative.inProgress, ...creative.completed, ...creative.onHold].reduce((sum, p) => sum + countChars(p), 0);

      // 使用中のタグを収集
      const usedTags = [...new Set([
        ...creative.inProgress.flatMap(p => p.tags || []),
        ...creative.completed.flatMap(p => p.tags || []),
        ...creative.onHold.flatMap(p => p.tags || []),
        ...ideas.flatMap(i => i.tags || [])
      ])];

      const addProject = (status) => {
        const newProject = { id: `project-${Date.now()}`, name: '新規作品', tags: [], expanded: true, targetCount: 0, collapsedSections: {}, stickies: [], items: [
          { id: `item-${Date.now()}-1`, type: 'chapter', name: '1話', content: '', sectionId: null },
          { id: `item-${Date.now()}-2`, type: 'memo', name: 'プロット', content: '' },
        ]};
        setData({...data, creative: {...creative, [status]: [...creative[status], newProject]}});
      };

      const addItem = (projectId, status, type, sectionId = null) => {
        setData({...data, creative: {...creative, [status]: creative[status].map(p => {
          if (p.id === projectId) {
            if (type === 'section') {
              // 既存の章から「○章」パターンの最大番号を見つける
              const chapterPattern = /^(\d+)章$/;
              let maxNum = 0;
              p.items.filter(i => i.type === 'section').forEach(s => {
                const match = s.name.match(chapterPattern);
                if (match) {
                  maxNum = Math.max(maxNum, parseInt(match[1], 10));
                }
              });
              return {...p, items: [...p.items, { id: `section-${Date.now()}`, type: 'section', name: `${maxNum + 1}章`, expanded: true }]};
            }
            // 話を追加する場合：章ごとにカウント
            if (type === 'chapter') {
              let count;
              if (sectionId) {
                // 章内の話数をカウント
                count = p.items.filter(i => i.type === 'chapter' && i.sectionId === sectionId).length;
              } else {
                // 章に属さない話数をカウント
                count = p.items.filter(i => i.type === 'chapter' && !i.sectionId).length;
              }
              const newItem = { id: `item-${Date.now()}`, type: 'chapter', name: `${count + 1}話`, content: '', sectionId, progress: 'not_started' };
              return {...p, items: [...p.items, newItem]};

            // メモの場合
            const memoCount = p.items.filter(i => i.type === 'memo').length;
            const newItem = { id: `item-${Date.now()}`, type, name: `メモ${memoCount > 0 ? memoCount + 1 : ''}`, content: '' };
            return {...p, items: [...p.items, newItem]};
          }
          return p;
        })}});
      };

      // 章の折りたたみ切り替え
      const toggleChapterSection = (projectId, sectionId, status) => {
        setData({...data, creative: {...creative, [status]: creative[status].map(p => {
          if (p.id === projectId) {
            return {...p, items: p.items.map(i => i.id === sectionId ? {...i, expanded: !i.expanded} : i)};
          }
          return p;
        })}});

      // 話を章に移動（移動後に話数を振り直し）
      const moveItemToSection = (projectId, itemId, newSectionId, status) => {
        setData({...data, creative: {...creative, [status]: creative[status].map(p => {

            // 話数の自動振り直し（章ごとに独立してカウント）
            const renumberPattern = /^(\d+)話$/;
            let noSectionNum = 1;
            const sectionCounters = {};
            items.filter(i => i.type === 'section').forEach(s => { sectionCounters[s.id] = 1; });
            
            items = items.map(item => {
              if (item.type === 'chapter' && renumberPattern.test(item.name)) {
                if (item.sectionId) {
                  return { ...item, name: `${sectionCounters[item.sectionId]++}話` };
                } else {
                  return { ...item, name: `${noSectionNum++}話` };
                }
              }
              return item;
            });
            
            return {...p, items};
          }
          return p;
        })}});
      };

      // アイテムの並べ替え
      const reorderItems = (projectId, status, draggedId, targetId, position) => {

            if (draggedIdx === -1 || targetIdx === -1) return p;
            const [dragged] = items.splice(draggedIdx, 1);
            const insertIdx = position === 'before' ? targetIdx : targetIdx + 1;
            items.splice(draggedIdx < targetIdx ? insertIdx - 1 : insertIdx, 0, dragged);
            
            // 話数の自動振り直し（章ごとに独立してカウント）
            const renumberPattern = /^(\d+)話$/;

            items.filter(i => i.type === 'section').forEach(s => { sectionCounters[s.id] = 1; });
            
            const renumberedItems = items.map(item => {
              if (item.type === 'chapter' && renumberPattern.test(item.name)) {
                if (item.sectionId) {
                  // 章に属する話
                  return { ...item, name: `${sectionCounters[item.sectionId]++}話` };
                } else {
                  // 章に属さない話
                  return { ...item, name: `${noSectionNum++}話` };
                }
              }
              return item;
            });
            
            return {...p, items: renumberedItems};
          }
          return p;
        })}});
      };
      
      // 章同士の並べ替え
      const reorderSections = (projectId, status, draggedSectionId, targetSectionId, position) => {
        setData({...data, creative: {...creative, [status]: creative[status].map(p => {
          if (p.id === projectId) {
            const items = [...p.items];

            const nonSections = items.filter(i => i.type !== 'section');
            
            const draggedIdx = sections.findIndex(s => s.id === draggedSectionId);
            const targetIdx = sections.findIndex(s => s.id === targetSectionId);
            if (draggedIdx === -1 || targetIdx === -1) return p;
            
            const [dragged] = sections.splice(draggedIdx, 1);
            const insertIdx = position === 'before' ? targetIdx : targetIdx + 1;
            sections.splice(draggedIdx < targetIdx ? insertIdx - 1 : insertIdx, 0, dragged);
            
            // 章番号の振り直し（「○章」パターンのみ）
            const renumberPattern = /^(\d+)章$/;
            const renumberedSections = sections.map((section, idx) => {
              if (renumberPattern.test(section.name)) {
                return { ...section, name: `${idx + 1}章` };
              }
              return section;

            // 非章アイテム + 章の順で結合
            return {...p, items: [...nonSections, ...renumberedSections]};
          }
          return p;
        })}});
      };

      const toggleProject = (projectId, status) => {
        setData({...data, creative: {...creative, [status]: creative[status].map(p => p.id === projectId ? {...p, expanded: !p.expanded} : p)}});

      const renameItem = (projectId, itemId, status, newName) => {
        setData({...data, creative: {...creative, [status]: creative[status].map(p => p.id === projectId ? {...p, items: p.items.map(i => i.id === itemId ? {...i, name: newName} : i)} : p)}});

      // 原稿の進捗を更新
      const updateItemProgress = (projectId, itemId, status, newProgress) => {

              return {...p, items: newItems};

            return p;

          if (selectedItem?.id === itemId) setSelectedItem(null);

      const renameProject = (projectId, status, newName) => {
